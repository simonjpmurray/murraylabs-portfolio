<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Murray Labs — Shipping ideas, one app at a time</title>
  <meta name="description" content="Murray Labs builds thoughtful apps that make life a little easier. Explore our projects." />
  <meta property="og:title" content="Murray Labs" />
  <meta property="og:description" content="Shipping ideas, one app at a time." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://murraylabs.dev" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #FF6B35;
      --accent-dark: #e05520;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #555555;
      --text-muted: #888888;
      --border: #e8eaed;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
      --radius-card: 16px;
      --radius-icon: 14px;
      --radius-btn: 10px;
    }

    html {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 0 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), #FF8C42);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(255,107,53,0.35);
    }

    h1 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .tagline {
      font-size: clamp(15px, 2.5vw, 18px);
      color: var(--text-secondary);
      font-weight: 400;
      letter-spacing: -0.1px;
    }

    /* ── Main / Grid ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .card-icon {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-icon);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      flex-shrink: 0;
    }

    .card-icon.campfire {
      background: linear-gradient(135deg, #FF6B35 0%, #FF8C42 60%, #FFAB2E 100%);
      box-shadow: 0 4px 14px rgba(255,107,53,0.4);
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .card-desc {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .card-footer {
      margin-top: 4px;
    }

    .btn-launch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: var(--radius-btn);
      transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 2px 6px rgba(255,107,53,0.3);
    }

    .btn-launch:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255,107,53,0.4);
    }

    .btn-launch:active {
      transform: translateY(0);
    }

    .btn-launch svg {
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .header-inner {
        padding: 32px 0 28px;
      }

      main {
        padding: 36px 16px 60px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 22px;
      }
    }

    @media (min-width: 601px) and (max-width: 899px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo-row">
        <div class="logo-icon">🧪</div>
        <h1>Murray Labs</h1>
      </div>
      <p class="tagline">Shipping ideas, one app at a time</p>
    </div>
  </header>

  <main>
    <p class="section-label">Our apps</p>
    <section class="grid">

      <article class="card">
        <div class="card-icon campfire">🔥</div>
        <div class="card-body">
          <h2 class="card-name">Campfire</h2>
          <p class="card-desc">Plan your perfect camping trip. Discover sites, pack smarter, and hit the trail with confidence.</p>
        </div>
        <div class="card-footer">
          <a class="btn-launch" href="https://camp-pal.vercel.app" target="_blank" rel="noopener noreferrer">
            Launch App
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2 11L11 2M11 2H5.5M11 2V7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </article>

    </section>
  </main>

  <footer>
    <p>&copy; 2026 Murray Labs</p>
  </footer>

</body>
</html>
